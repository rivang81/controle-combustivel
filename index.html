<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuel Tracker</title>
  <meta name="theme-color" content="#0f1115">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icone-192.png">
  <link rel="apple-touch-icon" href="icone-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body data-mascote="unicornio">
  <button type="button" class="config-btn" id="btnConfig" aria-label="Configurações">⚙️</button>

  <main>
    <h1 id="tituloApp">⛽ Controle de Combustível</h1>

    <button type="button" class="vel-btn" id="btnVel">🚘 Modo velocímetro</button>

    <!-- Registro -->
    <section class="card" id="registro">
      <h2 id="tituloForm">Novo abastecimento</h2>

      <div class="field ditado">
        <label for="ditado"><span id="labelDitado">🎤 Ditar registro</span>
          <span class="opt" id="optDitado">toque no campo e use o microfone do teclado</span></label>
        <div class="ditado-linha">
          <input type="text" id="ditado" autocomplete="off">
          <button type="button" class="mic-btn" id="btnMic" aria-label="Ditar por voz">🎤</button>
        </div>
        <p class="ditado-feedback" id="ditadoFeedback"></p>
      </div>

      <div class="fuel-toggle" role="radiogroup" aria-label="Combustível">
        <button type="button" class="fuel-btn" data-fuel="gasolina" id="btnGasolina">Gasolina</button>
        <button type="button" class="fuel-btn" data-fuel="etanol" id="btnEtanol">Etanol</button>
      </div>

      <div class="field">
        <label for="km" id="labelKm">Km rodados (trip)</label>
        <input type="text" id="km" inputmode="decimal" autocomplete="off">
      </div>

      <div class="field">
        <label for="litros" id="labelLitros">Litros abastecidos</label>
        <input type="text" id="litros" inputmode="decimal" autocomplete="off">
      </div>

      <div class="field">
        <label for="preco"><span id="labelPreco">Preço por litro ($)</span>
          <span class="opt" id="optPreco">opcional</span></label>
        <input type="text" id="preco" inputmode="decimal" autocomplete="off">
      </div>

      <div class="field">
        <label for="precoOutro"><span id="labelPrecoOutro">Preço do outro combustível</span>
          <span class="opt" id="optPrecoOutro">opcional — para medir a economia</span></label>
        <input type="text" id="precoOutro" inputmode="decimal" autocomplete="off">
      </div>

      <details class="ajuste-data">
        <summary id="ajusteDataSummary">Ajustar data/hora</summary>
        <input type="datetime-local" id="dataHora">
      </details>

      <button type="button" class="save-btn" id="btnSalvar">SALVAR</button>
      <p class="hint" id="hintPrimeiro" hidden></p>
    </section>

    <!-- Painel -->
    <section class="card" id="painel">
      <h2 id="tituloPainel">Painel</h2>
      <div class="stats" id="stats"></div>
      <div class="veredito" id="veredito"></div>
      <button type="button" class="graf-btn" id="btnGraficos">📊 Gráficos</button>
    </section>

    <!-- Histórico -->
    <section class="card" id="historico">
      <h2 id="tituloHistorico">Histórico</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th id="thData">Data</th><th id="thComb">Comb.</th><th id="thKm">Km</th>
              <th id="thLitros">Litros</th><th id="thConsumo">km/l</th><th id="thPreco">$/l</th>
              <th>± $</th><th></th></tr>
          </thead>
          <tbody id="listaHistorico"></tbody>
        </table>
      </div>
      <p class="hint" id="vazio" hidden></p>
    </section>
  </main>

  <!-- Modo velocímetro (GPS) -->
  <div class="painel-vel" id="painelVel" hidden>
    <button type="button" class="ir-abastecer" id="btnFecharVel">⛽ Abastecer</button>
    <div class="vel-valor aguardando" id="velValor">0</div>
    <div class="vel-unidade" id="velUnidade">mph</div>
    <p class="vel-status" id="velStatus"></p>
  </div>

  <!-- Gráficos históricos -->
  <div class="painel-graficos" id="painelGraficos" hidden>
    <div class="graficos-inner">
      <div class="graf-header">
        <h2 id="grafTitulo">Gráficos</h2>
        <button type="button" class="graf-fechar" id="btnFecharGraficos">← Voltar</button>
      </div>
      <div class="seg graf-gran">
        <button type="button" id="btnGranSemana">Semana</button>
        <button type="button" id="btnGranMes" class="selected">Mês</button>
        <button type="button" id="btnGranAno">Ano</button>
      </div>
      <div id="graficosConteudo"></div>
    </div>
    <div class="graf-tooltip" id="grafTooltip" hidden></div>
  </div>

  <!-- Configurações -->
  <div class="painel-config" id="painelConfig" hidden>
    <div class="config-card">
      <h2 id="cfgTitulo">Configurações</h2>

      <div class="config-grupo">
        <span class="config-label" id="cfgIdiomaLabel">Idioma</span>
        <div class="seg">
          <button type="button" id="btnIdiomaPt">Português</button>
          <button type="button" id="btnIdiomaEn">English</button>
        </div>
      </div>

      <div class="config-grupo">
        <span class="config-label" id="cfgUnidadesLabel">Unidades</span>
        <div class="seg">
          <button type="button" id="btnUniBr">Brasil (km, litros)</button>
          <button type="button" id="btnUniUs">EUA (milhas, galões)</button>
        </div>
      </div>

      <div class="config-grupo">
        <span class="config-label" id="cfgMascoteLabel">Mascote</span>
        <div class="seg">
          <button type="button" id="btnMascUnicornio">🦄 Unicórnio</button>
          <button type="button" id="btnMascAvioes">✈️ Aviões</button>
          <button type="button" id="btnMascPassarinho">🐦 Passarinho</button>
          <button type="button" id="btnMascDragao">🐉 Dragão</button>
          <button type="button" id="btnMascNenhum">🚫 Nenhum</button>
        </div>
      </div>

      <div class="config-grupo">
        <span class="config-label" id="cfgVozLabel">Resposta por voz</span>
        <div class="seg">
          <button type="button" id="btnVozOn">🔊 Ativada</button>
          <button type="button" id="btnVozOff">🔇 Desligada (só texto)</button>
        </div>
      </div>

      <div class="config-grupo">
        <label class="config-label" for="cfgTanque" id="cfgTanqueLabel">Tamanho do tanque (litros)</label>
        <input type="text" id="cfgTanque" inputmode="decimal" autocomplete="off">
      </div>

      <div class="config-grupo">
        <label class="config-label" for="cfgRendimento" id="cfgRendimentoLabel">Rendimento inicial do etanol</label>
        <input type="text" id="cfgRendimento" inputmode="decimal" autocomplete="off">
      </div>

      <button type="button" class="save-btn" id="btnFecharConfig">Fechar</button>
    </div>
  </div>

  <div class="toast" id="toast" hidden>✓</div>

  <script src="voz.min.js"></script>
  <script src="app.min.js"></script>
</body>
</html>
